---
# Docker stacks are managed by Arcane (https://arcane.hogwarts.zone) via
# GitOps sync. Ansible only decrypts and deploys the Arcane stack itself.
- name: Decrypt Arcane .env using sops
  ansible.builtin.command:
    cmd: sops --input-type dotenv --output-type dotenv --decrypt /docker/arcane/.env.sops
  environment:
    SOPS_AGE_KEY_FILE: /docker/secrets/age.key
  register: arcane_env
  changed_when: false
  no_log: true

- name: Write decrypted Arcane .env
  ansible.builtin.copy:
    content: "{{ arcane_env.stdout }}\n"
    dest: /docker/arcane/.env
    owner: root
    group: root
    mode: '0600'
  no_log: true

# Networks
- name: Create proxy network
  community.docker.docker_network:
    name: proxy
    state: present

# Volumes
- name: Create arcane_data volume
  community.docker.docker_volume:
    name: arcane_data
    state: present

- name: Create wireguard_confs volume
  community.docker.docker_volume:
    name: wireguard_confs
    state: present

# The transmission-wireguard pre-deploy hook (uid 65532) renders wg0.conf
# into this volume; fresh volumes are root-owned.
- name: Ensure wireguard_confs is writable by the hook runner
  ansible.builtin.command:
    cmd: docker run --rm -v wireguard_confs:/out alpine:3.22 chown 65532:65532 /out
  changed_when: false

# Deployments
- name: Deploy Arcane
  community.docker.docker_compose_v2:
    project_src: /docker/arcane
    pull: always
    state: present
