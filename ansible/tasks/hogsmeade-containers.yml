---
# Docker stacks are managed by Arcane (https://arcane.hogwarts.zone).
# Ansible only decrypts and deploys the Arcane stack itself.
- name: Find .env files in the Arcane docker directory
  ansible.builtin.find:
    paths: /docker/arcane
    patterns: ".env"
    file_type: file
    hidden: true
  register: arcane_env_files

- name: Decrypt .env files using dotenvx
  ansible.builtin.command:
    cmd: dotenvx decrypt -f {{ item.path }} -fk /docker/.env.keys
    chdir: "{{ item.path | dirname }}"
  loop: "{{ arcane_env_files.files }}"
  when: arcane_env_files.files | length > 0
  changed_when: false

# Networks
- name: Create proxy network
  community.docker.docker_network:
    name: proxy
    state: present

# Volumes
- name: Create arcane_data volume
  community.docker.docker_volume:
    name: arcane_data
    state: present

# Deployments
- name: Deploy Arcane
  community.docker.docker_compose_v2:
    project_src: /docker/arcane
    pull: always
    state: present
