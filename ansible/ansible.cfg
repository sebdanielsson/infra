[defaults]
# Print per-task timings and total runtime so slow tasks are visible in CI.
callbacks_enabled = ansible.posix.profile_tasks, ansible.posix.timer

[ssh_connection]
# Execute modules through the persistent SSH session instead of copying them
# over sftp first — roughly one round trip per task instead of three. Needs
# sudoers without requiretty on the target (Debian default).
pipelining = True
