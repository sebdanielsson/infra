---
- name: Hogsmeade Proxmox
  hosts: hogsmeade
  vars:
    ansible_python_interpreter: '/usr/bin/python3'
    sops_age_key: "{{ lookup('env', 'SOPS_AGE_KEY') }}"
    jellyfin_hostname: "{{ lookup('env', 'JELLYFIN_HOSTNAME') }}"
    idp_hostname: "{{ lookup('env', 'IDP_HOSTNAME') }}"

  handlers:
    - name: Import handlers
      ansible.builtin.import_tasks: handlers/main.yml

  roles:
    - name: Install and configure Caddy
      role: sebdanielsson.xcaddy
      vars:
        xcaddy_caddy_version: latest
        xcaddy_go_version: latest
        xcaddy_state: latest
        xcaddy_modules:
          - github.com/caddy-dns/cloudflare@v0.2.2
        xcaddy_caddyfile_content: |
          {
              email {{ lookup('env', 'CERTBOT_JELLYFIN_EMAIL') }}
              acme_dns cloudflare {{ lookup('env', 'CLOUDFLARE_CERTBOT_API_TOKEN') }}
          }

          {{ jellyfin_hostname }}:8920 {
              reverse_proxy 127.0.0.1:8096
          }

          {{ idp_hostname }} {
              reverse_proxy 127.0.0.1:1411
          }

          arcane.hogwarts.zone {
              reverse_proxy 127.0.0.1:3552
          }

    - name: Install Docker
      role: geerlingguy.docker
      vars:
        docker_edition: ce
        docker_yum_repo_enable_test: 0
        docker_yum_repo_enable_nightly: 0
        docker_packages_state: present
        docker_install_compose_plugin: true
        docker_compose_package: docker-compose-plugin
        docker_compose_package_state: present
        docker_install_compose: false
        docker_users:
          - sebastian
        docker_service_manage: true
        docker_service_state: started
        docker_service_enabled: true
        docker_restart_handler_state: restarted
        docker_daemon_options:
          data-root: '/mnt/dockerdata'
          log-driver: 'json-file'
          log-opts:
            max-size: '10m'
            max-file: '3'

    - name: Install and configure cloudflared
      role: sebdanielsson.cloudflared
      vars:
        cloudflare_tunnel_enable: true
        cloudflare_tunnel_credential: "{{ lookup('env', 'CLOUDFLARE_TUNNEL_HOGSMEADE') }}"
      state: present

    - name: Install and configure Tailscale
      role: artis3n.tailscale.machine
      tailscale_args: '--reset --ssh'
      vars:
        tailscale_authkey: "{{ lookup('env', 'TAILSCALE_SERVER_OAUTH') }}"
        tailscale_oauth_preauthorized: true
        tailscale_tags: ['server']
      state: present

    - name: Configure ACME on Proxmox node
      role: simoncaron.pve_acme
      vars:
        pve_acme_domain: "{{ lookup('env', 'PVE_ACME_DOMAIN') }}"
        pve_acme_account_name: default
        pve_acme_account_email: "{{ lookup('env', 'PVE_ACME_ACCOUNT_EMAIL') }}"
        pve_acme_account_directory: 'https://acme-v02.api.letsencrypt.org/directory'
        pve_acme_validation_delay: '30'
        pve_acme_plugin_name: 'cloudflare'
        pve_acme_plugin_api: 'cf'
        pve_acme_plugin_data: "{{ lookup('env', 'PVE_ACME_PLUGIN_DATA') }}"

    # - name: Configure Caddy on Proxmox node
    #   role: maxhoesel.caddy.caddy_server
    #   vars:
    #     caddy_apply_config: true
    #     caddy_config_mode: Caddyfile
    #     # caddy_json_config: {}
    #     caddy_caddyfile: |
    #       {
    #           email {{ lookup('env', 'CERTBOT_JELLYFIN_EMAIL') }}
    #           acme_dns cloudflare {{ lookup('env', 'CLOUDFLARE_CERTBOT_API_TOKEN') }}
    #       }

    #       {{ jellyfin_hostname }}:8920 {
    #           reverse_proxy 127.0.0.1:8096
    #       }

    #       {{ idp_hostname }} {
    #           reverse_proxy 127.0.0.1:1411
    #       }

  tasks:
    - name: Proxmox repo tasks
      ansible.builtin.import_tasks: tasks/proxmox-tasks.yml
      become: true

    - name: Install sops for environment file decryption
      ansible.builtin.get_url:
        url: "https://github.com/getsops/sops/releases/download/v3.13.2/sops-v3.13.2.linux.{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
        checksum: "sha256:https://github.com/getsops/sops/releases/download/v3.13.2/sops-v3.13.2.checksums.txt"
        dest: /usr/local/bin/sops
        owner: root
        group: root
        mode: '0755'
      become: true

    - name: Install ddclient
      ansible.builtin.include_role:
        name: maxhoesel.ddclient
      vars:
        ddclient_version: v4.0.0
        ddclient_executable_path: /usr/local/bin/ddclient
        ddclient_entries:
          - options:
              protocol: cloudflare
              zone: hogwarts.zone
              ttl: 1 # automatic
              login: token
              password: "{{ lookup('env', 'CF_TOKEN_DDCLIENT') }}"
            domains:
              - hogsmeade.hogwarts.zone
        ddclient_strategy_usev4: webv4
        ddclient_strategy_webv4: ipify-ipv4
        # ddclient_strategy_usev6: webv6
        # ddclient_strategy_ifv6: ipify-ipv6

    - name: SSH authorized key for 'root'
      ansible.posix.authorized_key:
        user: root
        key: "{{ lookup('env', 'SEBASTIAN_SSH_PUBLIC_KEY') }}"
        state: present

    - name: Copy sshd hardening config
      ansible.builtin.copy:
        src: 49-sshd-hardening.conf
        dest: /etc/ssh/sshd_config.d/49-sshd-hardening.conf
        owner: root
        group: root
        mode: '0644'

    - name: Copy ssh hardening config
      ansible.builtin.copy:
        src: 49-ssh-hardening.conf
        dest: /etc/ssh/ssh_config.d/49-ssh-hardening.conf
        owner: root
        group: root
        mode: '0644'

    - name: Ensure 'sebastian' user exists
      ansible.builtin.user:
        name: sebastian
        shell: /bin/bash
        group: sebastian
        groups: root,docker
        append: true
        state: present

    - name: SSH authorized key for 'sebastian'
      ansible.posix.authorized_key:
        user: sebastian
        key: "{{ lookup('env', 'SEBASTIAN_SSH_PUBLIC_KEY') }}"
        state: present

    - name: Install python3-full
      ansible.builtin.apt:
        name:
          - nfs-kernel-server
          - python3-full
        state: present

    - name: Add GitHub CLI apt repository
      ansible.builtin.deb822_repository:
        name: github-cli
        types: deb
        uris: https://cli.github.com/packages
        suites: stable
        components: main
        signed_by: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        state: present

    - name: Install GitHub CLI
      ansible.builtin.apt:
        name: gh
        state: present
        update_cache: true

    - name: Ensure net.ipv4.ip_forward is enabled
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        sysctl_set: true
        reload: true
        sysctl_file: /etc/sysctl.d/99-tailscale.conf
        state: present

    - name: Ensure net.ipv6.conf.all.forwarding is enabled
      ansible.posix.sysctl:
        name: net.ipv6.conf.all.forwarding
        value: '1'
        sysctl_set: true
        reload: true
        sysctl_file: /etc/sysctl.d/99-tailscale.conf
        state: present

    - name: Install sudo
      ansible.builtin.apt:
        name:
          - sudo
        state: present

    - name: Add sebastian to sudoers group
      ansible.builtin.user:
        name: sebastian
        groups: sudo
        append: true
        state: present

    - name: Let sudoers group use sudo
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        regexp: '^%sudo'
        line: '%sudo ALL=(ALL:ALL) NOPASSWD:ALL'
        create: true
        mode: '0440'
        state: present

    - name: Set hostname
      ansible.builtin.hostname:
        name: hogsmeade
        use: systemd

    - name: Install certbot and certbot-dns-cloudflare
      ansible.builtin.pip:
        name:
          - certbot
          - certbot-dns-cloudflare
        state: present
        virtualenv: ~/python_certbot/venv
        virtualenv_command: python3 -m venv
        virtualenv_site_packages: false

    - name: Add cloudflare_api_key for certbot plugin
      ansible.builtin.lineinfile:
        path: /etc/letsencrypt/cloudflare.ini
        regexp: '^dns_cloudflare_api_token'
        line: "dns_cloudflare_api_token = {{ lookup('env', 'CLOUDFLARE_CERTBOT_API_TOKEN') }}"
        create: true
        mode: '0640'
        state: present

    - name: Add renew hook for Jellyfin cert
      ansible.builtin.blockinfile:
        path: /etc/letsencrypt/renewal-hooks/deploy/jellyfin-pkcs12.sh
        block: |
          #!/bin/sh
          mkdir -p /certs/jellyfin
          openssl pkcs12 -export -password pass:{{ lookup('env', 'CERTBOT_JELLYFIN_PKCS12_PASSWORD') }} -out /certs/jellyfin/jellyfin.pfx -inkey /etc/letsencrypt/live/{{ lookup('env', 'CERTBOT_JELLYFIN_DOMAIN') }}/privkey.pem -in /etc/letsencrypt/live/{{ lookup('env', 'CERTBOT_JELLYFIN_DOMAIN') }}/cert.pem
          chmod 755 /certs/jellyfin/jellyfin.pfx
          chown root:docker /certs/jellyfin/jellyfin.pfx
        create: true
        mode: '0750'
        state: present

    - name: Create certbot-renew-jellyfin service
      ansible.builtin.copy:
        mode: '0644'
        dest: /etc/systemd/system/certbot-renew-jellyfin.service
        content: |
          [Unit]
          Description=Renew certificates acquired via Certbot
          Documentation=https://eff-certbot.readthedocs.io/en/stable/

          [Service]
          Type=oneshot
          ExecStart=/root/python_certbot/venv/bin/certbot renew --quiet --cert-name {{ lookup('env', 'CERTBOT_JELLYFIN_DOMAIN') }} --deploy-hook /etc/letsencrypt/renewal-hooks/deploy/jellyfin-pkcs12.sh
          PrivateTmp=true

    - name: Create certbot-renew-jellyfin.timer
      ansible.builtin.copy:
        mode: '0644'
        dest: /etc/systemd/system/certbot-renew-jellyfin.timer
        content: |
          [Unit]
          Description=Run Certbot twice daily

          [Timer]
          OnCalendar=*-*-* 00/12:00:00
          RandomizedDelaySec=12h
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Enable certbot-renew-jellyfin.timer
      ansible.builtin.systemd:
        name: certbot-renew-jellyfin.timer
        state: started
        enabled: true
        daemon_reload: true

    - name: Obtain cert for Jellyfin
      ansible.builtin.shell: |
        ~/python_certbot/venv/bin/certbot certonly \
        --dns-cloudflare \
        --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini \
        --email {{ lookup('env', 'CERTBOT_JELLYFIN_EMAIL') }} \
        --agree-tos \
        --key-type ecdsa \
        --elliptic-curve secp384r1 \
        --rsa-key-size 4096 \
        --hsts \
        --uir \
        --deploy-hook /etc/letsencrypt/renewal-hooks/deploy/jellyfin-pkcs12.sh \
        --domain {{ lookup('env', 'CERTBOT_JELLYFIN_DOMAIN') }}
      args:
        creates: /etc/letsencrypt/live/{{ lookup('env', 'CERTBOT_JELLYFIN_DOMAIN') }}/fullchain.pem

    - name: Create ZFS filesystem and set sharenfs property
      community.general.zfs:
        name: chungus/media
        extra_zfs_properties:
          sharenfs: crossmnt,no_root_squash,rw=192.168.1.0/24
        state: present

    - name: Limit ZFS ARC size (max 8 GiB, min 4 GiB)
      become: true
      ansible.builtin.lineinfile:
        path: /etc/modprobe.d/zfs.conf
        create: true
        line: "options zfs {{ item.name }}={{ item.value }}"
        regexp: "^options zfs {{ item.name }}"
        owner: root
        group: root
        mode: '0644'
      loop:
        - { name: zfs_arc_max, value: '8589934592' }
        - { name: zfs_arc_min, value: '4294967296' }
      loop_control:
        label: "{{ item.name }}"
      notify: Update initramfs

    # Applied live so a reboot isn't needed. Max is set before min because
    # zfs_arc_min cannot be raised above the current zfs_arc_max.
    - name: Apply ZFS ARC limits at runtime
      become: true
      ansible.builtin.shell: |
        param=/sys/module/zfs/parameters/{{ item.name }}
        [ "$(cat $param)" = "{{ item.value }}" ] && exit 90
        echo {{ item.value }} > $param
      args:
        executable: /bin/bash
      register: zfs_arc_runtime
      changed_when: zfs_arc_runtime.rc == 0
      failed_when: zfs_arc_runtime.rc not in [0, 90]
      loop:
        - { name: zfs_arc_max, value: '8589934592' }
        - { name: zfs_arc_min, value: '4294967296' }
      loop_control:
        label: "{{ item.name }}"

    - name: Install Python packages for docker management
      ansible.builtin.pip:
        name:
          - pyyaml
          - docker
        state: present
        virtualenv: ~/python_docker/venv
        virtualenv_command: python3 -m venv
        virtualenv_site_packages: false

    # Docker stacks are managed by Arcane; Ansible only syncs and deploys
    # the Arcane stack itself.
    - name: Ensure /docker directory exists
      ansible.builtin.file:
        path: /docker
        state: directory
        owner: root
        group: root
        mode: '0755'

    # Arcane (PUID 0) and its hook runners both run as root; keep the
    # managed project workspaces plainly root-owned.
    - name: Ensure Arcane-managed project dirs exist with root ownership
      ansible.builtin.file:
        path: "/docker/{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - nginx
        - media-stack
        - termix
        - portainer
        - open-webui
        - pocket-id
        - transmission-wireguard

    - name: Synchronize Arcane docker files
      ansible.posix.synchronize:
        src: ../docker/arcane/
        dest: /docker/arcane/
        archive: true
        delete: true
        owner: false
        group: false
        mode: push
        rsync_opts:
          - '--exclude=.DS_Store'

    - name: Docker System Prune
      ansible.builtin.command: docker system prune --all -f
      changed_when: true

    - name: Create /docker/secrets directory
      ansible.builtin.file:
        path: /docker/secrets
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Assert age key is present in the environment
      ansible.builtin.assert:
        that:
          - sops_age_key | length > 0
        fail_msg: SOPS_AGE_KEY is not set; refusing to write an empty age key
        quiet: true

    # Used by Ansible to decrypt the Arcane stack's .env.sops, and by
    # Arcane's GitOps pre-deploy hooks to decrypt every other stack's secrets.
    - name: Write age key for sops decryption
      ansible.builtin.copy:
        content: |
          {{ sops_age_key }}
        dest: /docker/secrets/age.key
        owner: root
        group: root
        mode: '0600'
      no_log: true

    - name: Remove legacy dotenvx binary
      ansible.builtin.file:
        path: /usr/local/bin/dotenvx
        state: absent

    - name: Remove legacy dotenvx key file
      ansible.builtin.file:
        path: /docker/.env.keys
        state: absent

    - name: Deploy Arcane
      ansible.builtin.import_tasks: tasks/hogsmeade-containers.yml
