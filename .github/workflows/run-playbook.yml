---
name: Run playbook

"on":
  push:
    branches:
      - main
    paths:
      - ansible/**
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: "sebdanielsson.infra/ansible"

jobs:
  run-playbook:
    name: Run playbook - ${{ matrix.server.name }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        server:
          - name: hogsmeade
          - name: bpi-r4
          - name: flightradar
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.server.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          path: "sebdanielsson.infra"

      - name: Setup sops
        run: |
          sudo curl -fsSL -o /usr/local/bin/sops "https://github.com/getsops/sops/releases/download/v3.13.2/sops-v3.13.2.linux.arm64"
          echo "78abf2e15c86250a1553ae6f53aba96be6b2a8126f160b1534959add3467ad76  /usr/local/bin/sops" | sha256sum -c -
          sudo chmod +x /usr/local/bin/sops

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Install Ansible dependencies
        run: |
          ansible-galaxy install -r requirements.yml --force

      - name: Disable host key checking
        run: |
          mkdir -p ~/.ssh
          echo "Host *" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Load Tailscale credentials
        id: ts
        run: |
          clientid=$(sops --input-type dotenv --output-type dotenv --decrypt --extract '["TS_CLIENTID"]' ../.env.ci.sops)
          clientsecret=$(sops --input-type dotenv --output-type dotenv --decrypt --extract '["TS_CLIENTSECRET"]' ../.env.ci.sops)
          # sops keeps the dotenv quoting as part of the value; strip it
          clientid=${clientid#\"}; clientid=${clientid%\"}
          clientsecret=${clientsecret#\"}; clientsecret=${clientsecret%\"}
          echo "::add-mask::$clientid"
          echo "::add-mask::$clientsecret"
          printf 'clientid=%s\nclientsecret=%s\n' "$clientid" "$clientsecret" >> "$GITHUB_OUTPUT"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          version: "latest"
          oauth-client-id: ${{ steps.ts.outputs.clientid }}
          oauth-secret: ${{ steps.ts.outputs.clientsecret }}
          tags: tag:ci
          ping: ${{ matrix.server.name }}

      - name: Run playbook ${{ matrix.server.name }}
        run: |
          SERVER_NAME_UNDER=$(echo "${{ matrix.server.name }}" | tr '-' '_')
          ../scripts/sops-run.sh .env.sops .env.${SERVER_NAME_UNDER}.sops -- ansible-playbook -i ./inventory.yml ./${{ matrix.server.name }}.yml
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
