---
name: Build sops-runner

"on":
  push:
    branches:
      - main
    paths:
      - docker/sops-runner/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push sops-runner
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read sops version from Dockerfile
        id: ver
        run: |
          tag=$(grep -oEm1 'sops:v[0-9]+\.[0-9]+\.[0-9]+' docker/sops-runner/Dockerfile | cut -d: -f2)
          test -n "$tag" || { echo "could not derive sops version from Dockerfile" >&2; exit 1; }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker/sops-runner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sebdanielsson/sops-runner:${{ steps.ver.outputs.tag }}
            ghcr.io/sebdanielsson/sops-runner:latest
